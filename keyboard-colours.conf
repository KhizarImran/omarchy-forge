# keyboard-colours.conf
# Per-theme keyboard RGB colour overrides.
# When a theme is listed here, this colour is used instead of the theme's accent.
#
# Format: theme-name=#rrggbb   (theme name must be snake-cased, same as omarchy uses)
#
# To find a theme's snake-cased name: omarchy-theme-current
# To add a new override, just add a line below and re-run bootstrap --hooks-only

osaka-jade=#00FF00
tokyo-night=#9D4EDD
